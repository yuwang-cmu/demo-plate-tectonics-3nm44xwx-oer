<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
  <title id="title">Mechanical layers that make plate motion possible</title>
  <desc id="desc">Cross-section showing two rigid lithospheric plates, each made of crust and lithospheric mantle, moving over a weaker asthenosphere. Arrows show plate motion away from a central ridge.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#173f5f"/></marker>
    <pattern id="flow" width="34" height="22" patternUnits="userSpaceOnUse"><path d="M0 11 Q8 0 17 11 T34 11" fill="none" stroke="#f6bd60" stroke-width="3"/></pattern>
  </defs>
  <rect width="1000" height="520" fill="#f7fbff"/>
  <path d="M0 115 L380 115 Q500 55 620 115 L1000 115 L1000 190 L0 190 Z" fill="#547aa5"/>
  <path d="M0 190 L390 190 Q500 125 610 190 L1000 190 L1000 315 L0 315 Z" fill="#9b6a4a"/>
  <rect x="0" y="315" width="1000" height="205" fill="#8c3b3b"/>
  <rect x="0" y="315" width="1000" height="205" fill="url(#flow)" opacity="0.65"/>
  <path d="M480 315 C470 265 475 210 500 145 C525 210 530 265 520 315" fill="#ef8354" stroke="#7b2d26" stroke-width="4"/>
  <path d="M455 95 H280" stroke="#173f5f" stroke-width="7" marker-end="url(#arrow)"/>
  <path d="M545 95 H720" stroke="#173f5f" stroke-width="7" marker-end="url(#arrow)"/>
  <path d="M500 65 V25" stroke="#7b2d26" stroke-width="7" marker-end="url(#arrow)"/>
  <line x1="500" y1="80" x2="500" y2="315" stroke="#eef5ff" stroke-width="4" stroke-dasharray="10 8"/>
  <text x="175" y="156" text-anchor="middle" font-family="sans-serif" font-size="28" fill="white">crust</text>
  <text x="210" y="255" text-anchor="middle" font-family="sans-serif" font-size="28" fill="white">lithospheric mantle</text>
  <text x="500" y="365" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="700" fill="white">weaker asthenosphere</text>
  <text x="500" y="410" text-anchor="middle" font-family="sans-serif" font-size="24" fill="white">solid rock that deforms over geologic time</text>
  <text x="500" y="154" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="white">ridge axis</text>
  <text x="170" y="62" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#173f5f">rigid plate</text>
  <text x="830" y="62" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#173f5f">rigid plate</text>
  <path d="M20 325 H980" stroke="#f8f9fa" stroke-width="3" stroke-dasharray="14 9"/>
  <text x="25" y="307" font-family="sans-serif" font-size="20" fill="#2d1e16">lithosphere–asthenosphere boundary: mechanical, not chemical</text>
</svg>
