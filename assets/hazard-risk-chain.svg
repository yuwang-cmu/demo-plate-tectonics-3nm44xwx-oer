<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">From tectonic process to disaster risk and risk reduction</title>
  <desc id="desc">Plate-boundary processes generate hazards. Hazard becomes disaster risk when people and infrastructure are exposed and vulnerable. Monitoring, planning, engineering, education, and warning can reduce vulnerability or exposure but do not stop the tectonic process.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <rect width="1200" height="600" rx="28" fill="#f8fafc"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <text x="600" y="62" font-size="34" font-weight="700" fill="#0f172a">Hazard is not the same as disaster risk</text>
    <g stroke-width="3"><rect x="55" y="130" width="230" height="150" rx="18" fill="#dbeafe" stroke="#2563eb"/><rect x="355" y="130" width="230" height="150" rx="18" fill="#ffedd5" stroke="#ea580c"/><rect x="655" y="130" width="230" height="150" rx="18" fill="#fef3c7" stroke="#ca8a04"/><rect x="955" y="130" width="190" height="150" rx="18" fill="#fee2e2" stroke="#dc2626"/></g>
    <g font-size="25" font-weight="700" fill="#0f172a"><text x="170" y="175">Process</text><text x="470" y="175">Hazard</text><text x="770" y="175">Exposure +</text><text x="770" y="207">vulnerability</text><text x="1050" y="175">Risk</text></g>
    <g font-size="19" fill="#334155"><text x="170" y="220">fault slip · magma</text><text x="170" y="250">water displacement</text><text x="470" y="220">shaking · ash</text><text x="470" y="250">inundation</text><text x="770" y="245">people · buildings</text><text x="770" y="270">lifelines · choices</text><text x="1050" y="220">possible losses</text><text x="1050" y="250">and disruption</text></g>
    <g stroke="#334155" stroke-width="5" fill="none" marker-end="url(#a)"><path d="M285 205 H345"/><path d="M585 205 H645"/><path d="M885 205 H945"/></g>
    <rect x="210" y="390" width="780" height="135" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="600" y="435" font-size="27" font-weight="700" fill="#166534">Risk reduction changes consequences</text>
    <text x="600" y="475" font-size="20" fill="#334155">monitoring · land-use planning · resilient design · education · practiced warning response</text>
    <path d="M600 390 V310 H1050 V290" fill="none" stroke="#16a34a" stroke-width="5" marker-end="url(#a)"/>
    <text x="600" y="570" font-size="19" fill="#475569">A warning is useful only when detection, communication, trust, and a feasible protective action all connect.</text>
  </g>
</svg>
