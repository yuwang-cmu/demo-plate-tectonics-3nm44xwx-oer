<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Three idealized plate-boundary types</title>
  <desc id="desc">Three panels compare divergent motion with crust creation, convergent motion with subduction and crust recycling, and transform motion with lateral sliding and no net crust creation or destruction.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#173f5f"/></marker></defs>
  <rect width="1200" height="560" fill="#fbfcfe"/>
  <g font-family="sans-serif">
    <g transform="translate(0,0)">
      <text x="200" y="48" text-anchor="middle" font-size="30" font-weight="700" fill="#173f5f">Divergent</text>
      <path d="M20 210 L150 210 L200 160 L250 210 L380 210 L380 310 L20 310 Z" fill="#557a95"/>
      <rect x="20" y="310" width="360" height="165" fill="#b85c38"/>
      <path d="M200 315 C180 275 185 230 200 170 C215 230 220 275 200 315" fill="#f6bd60"/>
      <path d="M180 130 H65" stroke="#173f5f" stroke-width="7" marker-end="url(#a)"/>
      <path d="M220 130 H335" stroke="#173f5f" stroke-width="7" marker-end="url(#a)"/>
      <text x="200" y="515" text-anchor="middle" font-size="22">new oceanic crust</text>
    </g>
    <g transform="translate(400,0)">
      <text x="200" y="48" text-anchor="middle" font-size="30" font-weight="700" fill="#173f5f">Convergent</text>
      <path d="M20 220 H205 Q280 230 360 340 L360 430 Q270 300 190 300 H20 Z" fill="#4b6f8a"/>
      <path d="M205 220 H380 V300 H250 Q225 265 205 220 Z" fill="#9f744f"/>
      <rect x="20" y="430" width="360" height="45" fill="#b85c38"/>
      <path d="M120 130 H190" stroke="#173f5f" stroke-width="7" marker-end="url(#a)"/>
      <path d="M300 130 H230" stroke="#173f5f" stroke-width="7" marker-end="url(#a)"/>
      <path d="M250 205 Q280 150 310 205" fill="#d1495b" stroke="#7b2d26" stroke-width="4"/>
      <text x="200" y="515" text-anchor="middle" font-size="22">subduction recycles lithosphere</text>
    </g>
    <g transform="translate(800,0)">
      <text x="200" y="48" text-anchor="middle" font-size="30" font-weight="700" fill="#173f5f">Transform</text>
      <rect x="20" y="205" width="170" height="220" fill="#7899b3"/>
      <rect x="210" y="205" width="170" height="220" fill="#9f744f"/>
      <path d="M190 190 L210 440" stroke="#33261d" stroke-width="8"/>
      <path d="M90 155 V265" stroke="#173f5f" stroke-width="7" marker-end="url(#a)"/>
      <path d="M310 470 V360" stroke="#173f5f" stroke-width="7" marker-end="url(#a)"/>
      <g fill="#d1495b"><circle cx="180" cy="270" r="8"/><circle cx="205" cy="325" r="10"/><circle cx="215" cy="380" r="7"/></g>
      <text x="200" y="515" text-anchor="middle" font-size="22">lateral slip; shallow earthquakes</text>
    </g>
  </g>
  <line x1="400" y1="70" x2="400" y2="540" stroke="#d6dee5" stroke-width="3"/>
  <line x1="800" y1="70" x2="800" y2="540" stroke="#d6dee5" stroke-width="3"/>
</svg>
