<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Symmetric magnetic stripes produced by seafloor spreading</title>
  <desc id="desc">A mid-ocean ridge is centered between mirror-image bands of normal and reversed magnetic polarity. Ocean-floor ages increase outward from zero at the ridge, illustrating how stripe width and distance can constrain spreading rate.</desc>
  <defs><marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#173f5f"/></marker></defs>
  <rect width="1100" height="560" fill="#f8fbfd"/>
  <g transform="translate(90,125)">
    <rect x="0" y="80" width="130" height="170" fill="#2a6f97"/>
    <rect x="130" y="80" width="95" height="170" fill="#f6bd60"/>
    <rect x="225" y="80" width="145" height="170" fill="#2a6f97"/>
    <rect x="370" y="80" width="90" height="170" fill="#f6bd60"/>
    <path d="M460 250 L460 100 L500 45 L540 100 L540 250 Z" fill="#c8553d"/>
    <rect x="540" y="80" width="90" height="170" fill="#f6bd60"/>
    <rect x="630" y="80" width="145" height="170" fill="#2a6f97"/>
    <rect x="775" y="80" width="95" height="170" fill="#f6bd60"/>
    <rect x="870" y="80" width="130" height="170" fill="#2a6f97"/>
    <path d="M455 55 H320" stroke="#173f5f" stroke-width="7" marker-end="url(#arr)"/>
    <path d="M545 55 H680" stroke="#173f5f" stroke-width="7" marker-end="url(#arr)"/>
    <line x1="500" y1="30" x2="500" y2="270" stroke="#7b2d26" stroke-width="4" stroke-dasharray="8 6"/>
    <g font-family="sans-serif" font-size="20" text-anchor="middle" fill="#17202a">
      <text x="65" y="285">oldest shown</text><text x="500" y="285">0 Ma</text><text x="935" y="285">oldest shown</text>
      <text x="500" y="5" font-size="25" font-weight="700">ridge axis</text>
    </g>
  </g>
  <g font-family="sans-serif">
    <rect x="340" y="470" width="40" height="25" fill="#2a6f97"/><text x="390" y="491" font-size="21">normal polarity</text>
    <rect x="595" y="470" width="40" height="25" fill="#f6bd60"/><text x="645" y="491" font-size="21">reversed polarity</text>
    <text x="550" y="90" text-anchor="middle" font-size="27" fill="#173f5f">same reversal sequence on both sides → mirror symmetry</text>
    <text x="550" y="535" text-anchor="middle" font-size="22">Half-spreading rate = distance from ridge ÷ crustal age</text>
  </g>
</svg>
