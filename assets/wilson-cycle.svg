<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" role="img" aria-labelledby="title desc">
  <title id="title">Six-stage Wilson cycle</title>
  <desc id="desc">A clockwise sequence links continental rifting, a young sea, a mature ocean, subduction initiation, a closing ocean, and continent-continent collision. A final arrow returns from collision and suture formation to renewed rifting.</desc>
  <defs><marker id="arrow" markerWidth="11" markerHeight="9" refX="10" refY="4.5" orient="auto"><path d="M0,0 L11,4.5 L0,9 Z" fill="#173f5f"/></marker></defs>
  <rect width="1000" height="650" fill="#fbfcfe"/>
  <circle cx="500" cy="325" r="140" fill="#e8f1f8" stroke="#6c8ca3" stroke-width="4"/>
  <text x="500" y="307" text-anchor="middle" font-family="sans-serif" font-size="29" font-weight="700" fill="#173f5f">ocean basins</text>
  <text x="500" y="347" text-anchor="middle" font-family="sans-serif" font-size="29" font-weight="700" fill="#173f5f">open and close</text>
  <g font-family="sans-serif" text-anchor="middle">
    <g><rect x="405" y="25" width="190" height="82" rx="16" fill="#f6bd60"/><text x="500" y="60" font-size="25" font-weight="700">1 · Rift</text><text x="500" y="89" font-size="18">continent stretches</text></g>
    <g><rect x="700" y="135" width="210" height="82" rx="16" fill="#84a59d"/><text x="805" y="170" font-size="25" font-weight="700">2 · Young sea</text><text x="805" y="199" font-size="18">oceanic crust begins</text></g>
    <g><rect x="720" y="430" width="210" height="82" rx="16" fill="#5b8e7d"/><text x="825" y="465" font-size="25" font-weight="700">3 · Mature ocean</text><text x="825" y="494" font-size="18">spreading widens basin</text></g>
    <g><rect x="395" y="545" width="210" height="82" rx="16" fill="#d1495b"/><text x="500" y="580" font-size="25" font-weight="700">4 · Subduction</text><text x="500" y="609" font-size="18">old lithosphere sinks</text></g>
    <g><rect x="60" y="430" width="230" height="82" rx="16" fill="#e07a5f"/><text x="175" y="465" font-size="24" font-weight="700">5 · Closing ocean</text><text x="175" y="494" font-size="16">consumption exceeds creation</text></g>
    <g><rect x="90" y="135" width="210" height="82" rx="16" fill="#9b6a4a"/><text x="195" y="170" font-size="25" font-weight="700">6 · Collision</text><text x="195" y="199" font-size="18">mountain belt + suture</text></g>
  </g>
  <g fill="none" stroke="#173f5f" stroke-width="6" marker-end="url(#arrow)">
    <path d="M600 70 Q710 75 765 130"/><path d="M900 225 Q950 325 905 420"/><path d="M715 500 Q655 570 615 578"/><path d="M385 580 Q300 570 285 510"/><path d="M90 420 Q45 315 95 220"/><path d="M305 140 Q365 78 395 72"/>
  </g>
</svg>
